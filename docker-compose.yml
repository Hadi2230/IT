version: '3.9'
services:
  backend:
    build:
      context: ./apps/backend
    env_file:
      - ./apps/backend/.env
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/usr/src/app/uploads
      - backend_db:/usr/src/app/prisma
    restart: unless-stopped
volumes:
  backend_uploads:
  backend_db: