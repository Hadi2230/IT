<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Support - Agent</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; }
      input, button { padding: 8px 12px; margin-right: 8px; }
      video { width: 480px; height: 320px; background: #111; }
      .row { margin: 12px 0; }
    </style>
  </head>
  <body>
    <h1>Remote Agent</h1>
    <div class="row">
      <input id="code" placeholder="Enter session code" />
      <button id="join">Join</button>
    </div>
    <div class="row">
      <video id="remote" autoplay playsinline></video>
    </div>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      const socket = io('/remote');
      let pc;
      document.getElementById('join').onclick = async () => {
        const code = document.getElementById('code').value.trim();
        socket.emit('join', { code, role: 'agent' });
        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        pc.ontrack = (e) => { document.getElementById('remote').srcObject = e.streams[0]; };
        pc.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', { code, payload: { candidate: e.candidate } }); };
        socket.on('signal', async (msg) => {
          const { payload } = msg;
          if (payload.offer) {
            await pc.setRemoteDescription(payload.offer);
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { code, payload: { answer } });
          } else if (payload.candidate) {
            try { await pc.addIceCandidate(payload.candidate); } catch {}
          }
        });
      };
    </script>
  </body>
  </html>
